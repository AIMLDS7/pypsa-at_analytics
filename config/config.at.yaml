# Basisszenario für PyPSA-AT mit Anpassungen des KN2045_Mix Szenarios aus PyPSA-DE with
#   * custom administrative clustering für Austrian regions
#   * calibrations

run:
  prefix: v2025.04
  name:
  - AT_KN2040
  scenarios:
    enable: true
    # PyPSA-DE uses config/scenarios.automated.yaml to incorporate Ariadne project
    # specific scenario settings in model runs. PyPSA-AT uses the KN2045_Mix scenario
    # for all AT scenarios as a base. As a result, the build_scenario step is obsolete.
    # We simply use the manual file with hard coded values.
    file: config/scenarios.manual.yaml

countries: ['AL', 'AT', 'BA', 'BE', 'BG', 'CH', 'CZ', 'DE', 'DK', 'EE', 'ES', 'FI', 'FR', 'GB', 'GR', 'HR', 'HU', 'IE', 'IT', 'LT', 'LU', 'LV', 'ME', 'MK', 'NL', 'NO', 'PL', 'PT', 'RO', 'RS', 'SE', 'SI', 'SK', 'XK']
scenario:
  ll:
  - v1.25
  clusters:
  - adm
  opts:
  - ''
  sector_opts:
  - none
  planning_horizons:
  - 2025
  - 2030
  - 2040
  - 2050

electricity:
  transmission_limit: v1.25
  voltages: [110., 220., 300., 330., 380., 400., 500., 750.]

clustering:
  mode: administrative
  administrative:
    level: 0 # countries
    AT: 3 # 10 regions if NUTS 2, 35 if NUTS 3
    DE: 3 # NUTS3 as a proxy for 5 regions
    DK: 1 # +1 islands
    GB: 1 # +1 North Ireland
    FR: 1 # +1 islands
    IT: 1 # +2 islands
    ES: 1 # +1 islands
  temporal:
    resolution_sector: 365H

sector:
  v2g: false
  solar_thermal: true
  biomass_transport: true
  regional_methanol_demand: true
  gas_network: true
  electrobiofuels: true
  biosng: true
  biosng_cc: true
  bioH2: true
  municipal_solid_waste: true
  cluster_heat_buses: true
  hydrogen_turbines: false  # PyPSA-AT uses the PyPSA-DE implementation in electricity.H2_plants instead
  methanol:
    regional_methanol_demand: true
    methanol_reforming: true
    methanol_reforming_cc: true
    methanol_to_kerosene: true
    methanol_to_power:
      ccgt: true
      ccgt_cc: true
      ocgt: true
      allam: true
    biomass_to_methanol: true
    biomass_to_methanol_cc: true
  ammonia: "regional"
  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25
  co2_network: true
  imports:  # this is for renewable gas/H2/methanol/oil imports
    enable: false

  # PyPSA-DE KN2045_Mix scenario settings
  aviation_demand_factor:
    2020: 1.0
    2025: 1.096
    2030: 1.1816
    2035: 1.2048
    2040: 1.2285
    2045: 1.1193
    2050: 1.0157

industry:
  # gas compression seems incompatible with gas network. Pipelines connect
  # gas buses. However, Generators in '{node} gas primary' buses introduce gas
  # energy at local nodes, which is then compressed to the local gas bus.
  # As a result, gas is not transported via pipelines.
  # Note that gas compression AC withdrawal still is implemented. Losses are
  # for methane to the atmosphere.
  gas_compression_losses: 0  # 0.04

  # PyPSA-DE KN2045_Mix scenario settings
  St_primary_fraction:
    2020: 0.7023
    2025: 0.705
    2030: 0.6929
    2035: 0.6592
    2040: 0.6266
    2045: 0.6047
    2050: 0.5995
  DRI_fraction:
    2020: 0.0
    2025: 0.0
    2030: 0.2011
    2035: 0.4974
    2040: 0.7751
    2045: 1.0
    2050: 1.0

data:
  osm:
    source: archive
    version: 0.1-at

solving:
  # The default CO2 budget uses the KSG targets, and the non CO2 emissions from the REMIND model in the KN2045_Mix scenario
  constraints:
    co2_budget_national:
      AT:
        2020: 0.67
        2025: 0.52
        2030: 0.34
        2035: 0.21
        2040: 0.00
        2045: -0.00
        2050: -0.05
      DE:  # KN2045_Mix scenario settings
        2020: 0.691
        2025: 0.538
        2030: 0.364
        2035: 0.216
        2040: 0.09
        2045: -0.05
        2050: -0.048
    limits_capacity_min:
      Link:
        H2 Electrolysis:
          AT:
            # EAG Ausbauziel: 1 GW Elektrolyseleistung in MW_el in AT
            # limit set for p_nom_opt, which already is for MW_el at bus0
            2030: 1
            2040: 1
            2050: 1
  solver:
    name: highs
    options: highs-default
  solver_options:
    # https://ergo-code.github.io/HiGHS/dev/options/definitions/
    highs-default:
      threads: 0
      random_seed: 123
    gurobi-default:
      Seed: 123

mods:

  # AT10 or NUTS3 administrative clustering
  modify_nuts3_shapes: AT35DE5

  # scale_capacity does not work for Line components, hence we use this
  # modification to update any transmission capacity (Links or Lines)
  modify_austrian_transmission_capacities: true

  # update urban population share for AT regions
  modify_population_layouts: true

  # split gas generators by type and multiply generator
  # marginal costs by the following factors
  unravel_natural_gas_imports:
    enable: true
    lng: 1.2
    pipeline: 1.0
    production: 0.95
